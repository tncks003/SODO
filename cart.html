<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart - SODO</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="logo">SODO</a>

    <button class="menu-toggle" type="button">MENU</button>

    <nav class="nav">
      <a href="shop.html">SHOP</a>
      <a href="collection.html">COLLECTION</a>
      <a href="about.html">ABOUT</a>
      <a href="journal.html">JOURNAL</a>
      <a href="login.html">LOGIN</a>
      <a href="cart.html">CART</a>
    </nav>
  </header>

  <main class="page">
    <section class="page-title">
      <h1>CART</h1>
      <p>Your selected SODO items.</p>
    </section>

    <section class="cart-layout">

      <div class="cart-left">
        <div id="emptyCart" class="empty-cart">
          <p>Your cart is currently empty.</p>
          <a href="shop.html">CONTINUE SHOPPING</a>
        </div>

        <div id="cartItems" class="cart-items"></div>
      </div>

      <aside id="cartSummary" class="cart-summary">
        <h2>ORDER SUMMARY</h2>

        <div class="summary-row">
          <span>Subtotal</span>
          <strong id="cartSubtotal">₩0</strong>
        </div>

        <div class="summary-row">
          <span>Shipping</span>
          <strong>Free</strong>
        </div>

        <div class="summary-total">
          <span>Total</span>
          <strong id="cartTotal">₩0</strong>
        </div>

        <button type="button" class="checkout-button">
          CHECKOUT
        </button>

        <p class="checkout-note">
          현재 결제 기능은 데모 단계입니다.
        </p>
      </aside>

    </section>
  </main>

  <footer class="footer">
    <p>© <span id="year"></span> SODO. All rights reserved.</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
