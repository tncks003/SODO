<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product - SODO</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="logo">SODO</a>

    <nav class="nav">
      <a href="shop.html">SHOP</a>
      <a href="collection.html">COLLECTION</a>
      <a href="about.html">ABOUT</a>
      <a href="journal.html">JOURNAL</a>
      <a href="#">LOGIN</a>
      <a href="#">CART</a>
    </nav>
  </header>

  <main class="page">
    <section class="product-detail">

      <div class="product-detail-image">
        <span>SODO</span>
      </div>

      <div class="product-detail-info">
        <p class="category">SODO ESSENTIALS</p>
        <h1>Essential Logo T-Shirt</h1>
        <p class="price">₩75,000</p>

        <p class="description">
          일상에서 편하게 입을 수 있는 SODO의 기본 티셔츠입니다.
          여유 있는 실루엣과 부드러운 코튼 소재를 사용해 단독으로 입거나
          이너로 활용하기 좋습니다.
        </p>

        <div class="option-box">
          <p>SIZE</p>
          <div class="size-list">
            <button>S</button>
            <button>M</button>
            <button>L</button>
            <button>XL</button>
          </div>
        </div>

        <button class="cart-button">ADD TO CART</button>

        <div class="product-notice">
          <p>Material: Cotton 100%</p>
          <p>Color: White / Black / Charcoal</p>
          <p>Made in Korea</p>
        </div>
      </div>

    </section>
  </main>

  <footer class="footer">
    <p>© <span id="year"></span> SODO. All rights reserved.</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
