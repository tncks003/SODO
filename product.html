<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product - SODO</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="logo">SODO</a>

    <nav class="nav">
      <a href="shop.html">SHOP</a>
      <a href="collection.html">COLLECTION</a>
      <a href="about.html">ABOUT</a>
      <a href="journal.html">JOURNAL</a>
      <a href="#">LOGIN</a>
      <a href="#">CART</a>
    </nav>
  </header>

  <main class="page">
    <section class="product-detail">

      <div class="product-detail-image">
        <img id="productImage" src="" alt="" />
        <span id="productImageFallback">SODO</span>
      </div>

      <div class="product-detail-info">
        <p class="category" id="productCategory">SODO ESSENTIALS</p>
        <h1 id="productName">Essential Logo T-Shirt</h1>
        <p class="price" id="productPrice">₩75,000</p>

        <p class="description" id="productDescription">
          일상에서 편하게 입을 수 있는 SODO의 기본 티셔츠입니다.
        </p>

        <div class="option-box">
          <p>SIZE</p>
          <div class="size-list">
            <button type="button">S</button>
            <button type="button">M</button>
            <button type="button">L</button>
            <button type="button">XL</button>
          </div>
        </div>

        <button class="cart-button" type="button">ADD TO CART</button>

        <div class="product-notice">
          <p id="productMaterial">Material: Cotton 100%</p>
          <p id="productColor">Color: White / Black / Charcoal</p>
          <p id="productMade">Made in Korea</p>
        </div>
      </div>

    </section>
  </main>

  <footer class="footer">
    <p>© <span id="year"></span> SODO. All rights reserved.</p>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
